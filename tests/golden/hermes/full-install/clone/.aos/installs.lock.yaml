version: 1
harness: hermes
install_home: /home/anakin/.hermes/profiles/aos-test
overlay_sources:
- /home/anakin/aos/tests/.sandbox/aos-clone/MOD.md
- /home/anakin/aos/tests/.sandbox/aos-clone/kb-registry.yaml
- /home/anakin/aos/tests/.sandbox/aos-clone/capabilities/kb/MOD.md
- /home/anakin/aos/tests/.sandbox/aos-clone/capabilities/gtd-capture/MOD.md
created_profiles:
- aos-test
- aos-archiver
- aos-drainer
config_keys:
- profile: aos-test
  key: model.default
  value: gpt-5.6-luna
- profile: aos-archiver
  key: model.default
  value: gpt-5.6-luna
- profile: aos-drainer
  key: model.default
  value: gpt-5.6-luna
capabilities:
  kb:
    version: 0.2.0
    profiles:
    - aos-test
    - aos-archiver
    schedules_owned:
    - profile: aos-archiver
      id: nightly-promote
      job_id: <ID>
      name: aos:kb:nightly-promote
    - profile: aos-archiver
      id: weekly-lint
      job_id: <ID>
      name: aos:kb:weekly-lint
    - profile: aos-archiver
      id: sync
      job_id: <ID>
      name: aos:kb:sync
    kbs_initialized:
    - personal-kb
    - acme-kb
    degraded_modes: []
  onboarding:
    version: 0.1.1
    profiles:
    - aos-test
    schedules_owned: []
  gtd-capture:
    version: 0.1.1
    profiles:
    - aos-test
    - aos-drainer
    schedules_owned:
    - profile: aos-drainer
      id: nightly-drain
      job_id: <ID>
      name: aos:gtd-capture:nightly-drain
    degraded_modes:
    - 'messaging.outbound: reminders use local delivery/reporting because the namespaced
      profiles have no outbound messaging'
