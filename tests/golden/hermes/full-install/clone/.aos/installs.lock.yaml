version: 1
harness: hermes
install_home: <HOME>/.hermes/profiles/aos-test
overlay_sources:
- <HOME>/aos/tests/.sandbox/aos-clone/MOD.md
- <HOME>/aos/tests/.sandbox/aos-clone/kb-registry.yaml
- <HOME>/aos/tests/.sandbox/aos-clone/capabilities/kb/MOD.md
- <HOME>/aos/tests/.sandbox/aos-clone/capabilities/gtd-capture/MOD.md
created_profiles:
- aos-test
- aos-archiver
- aos-drainer
config_keys:
- profile: aos-archiver
  key: model.default
  value: global.anthropic.claude-sonnet-5
- profile: aos-archiver
  key: model.provider
  value: bedrock
- profile: aos-drainer
  key: model.default
  value: global.anthropic.claude-sonnet-5
- profile: aos-drainer
  key: model.provider
  value: bedrock
tool_installs:
- command: uv tool install --from <HOME>/aos/tests/.sandbox/aos-clone/capabilities/kb/tool aos-base
  package: aos-base==0.3.0
  executable: base
capabilities:
  onboarding:
    version: 0.2.0
    profiles:
    - aos-test
    schedules_owned: []
  kb:
    version: 0.3.0
    profiles:
    - aos-test
    - aos-archiver
    schedules_owned:
    - profile: aos-archiver
      id: nightly-promote
      job_id: <ID>
      name: aos:kb:nightly-promote
    - profile: aos-archiver
      id: weekly-lint
      job_id: <ID>
      name: aos:kb:weekly-lint
    - profile: aos-archiver
      id: sync
      job_id: <ID>
      name: aos:kb:sync
    kbs_registered:
    - personal-kb
    - acme-kb
    degraded_modes: []
  gtd-capture:
    version: 0.2.0
    profiles:
    - aos-test
    - aos-drainer
    schedules_owned:
    - profile: aos-drainer
      id: nightly-drain
      job_id: <ID>
      name: aos:gtd-capture:nightly-drain
    degraded_modes:
    - 'messaging.outbound: reminder_target is whatsapp:+<ID> but this sandbox profile has no outbound
      messaging wired; reminders are reported in the drain close-out instead of delivered.'
artifacts:
- path: <HOME>/.hermes/profiles/aos-archiver/SOUL.md
  sha256: <SHA256>
- path: <HOME>/.hermes/profiles/aos-archiver/config.yaml
  sha256: <SHA256>
- path: <HOME>/.hermes/profiles/aos-archiver/scripts/kb-sync-all.sh
  sha256: <SHA256>
- path: <HOME>/.hermes/profiles/aos-archiver/skills/kb-kb/SKILL.md
