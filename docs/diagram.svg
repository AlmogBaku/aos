<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#001F5C"/>
    </marker>
    <style>
      .tier-label { font-size: 11px; font-weight: 700; fill: #001F5C; letter-spacing: 0.8px; }
      .atomic     { font-size: 10px; font-style: italic; fill: #8A6D00; }
      .box   { rx: 8; ry: 8; stroke-width: 1.4; }
      .atom  { fill: #F2F7FF; stroke: #5B84C4; }
      .mol   { fill: #FFF3E0; stroke: #B07300; }
      .org   { fill: #EEF3FF; stroke: #001F5C; }
      .mod   { fill: #FCE9EF; stroke: #A61E4D; }
      .adapt { fill: #E8F5E9; stroke: #1B5E20; }
      .page  { fill: #001F5C; }
      .box-t { font-size: 12px; fill: #111; text-anchor: middle; font-weight: 600; }
      .caption { font-size: 10px; fill: #555; text-anchor: middle; }
      .flow  { stroke: #001F5C; stroke-width: 1.2; fill: none; opacity: 0.5; }
      .side  { font-size: 10px; fill: #1B5E20; }
    </style>
  </defs>

  <!-- Tier: organisms (use-case capabilities) -->
  <text class="tier-label" x="30" y="34">USE-CASE CAPABILITIES <tspan class="atomic">· organisms</tspan></text>
  <g>
    <rect class="box org" x="30"  y="46" width="128" height="46"/><text class="box-t" x="94"  y="74">GTD capture</text>
    <rect class="box org" x="170" y="46" width="128" height="46"/><text class="box-t" x="234" y="74">Time blocking</text>
    <rect class="box org" x="310" y="46" width="128" height="46"/><text class="box-t" x="374" y="74">News tracker</text>
    <rect class="box org" x="450" y="46" width="138" height="46"/><text class="box-t" x="519" y="74">Personal trainer</text>
    <rect class="box org" x="600" y="46" width="90" height="46"/><text class="box-t" x="645" y="74">…</text>
  </g>

  <!-- Tier: molecules (infrastructure capabilities) -->
  <text class="tier-label" x="30" y="140">INFRASTRUCTURE CAPABILITIES <tspan class="atomic">· molecules</tspan></text>
  <g>
    <rect class="box mol" x="30"  y="152" width="150" height="54"/><text class="box-t" x="105" y="176">Knowledge base</text><text class="caption" x="105" y="192">registry · router · authz</text>
    <rect class="box mol" x="195" y="152" width="140" height="54"/><text class="box-t" x="265" y="176">Onboarding</text><text class="caption" x="265" y="192">interview → MOD.md</text>
    <rect class="box mol" x="350" y="152" width="130" height="54"/><text class="box-t" x="415" y="176">Importer</text><text class="caption" x="415" y="192">wrap what you built</text>
    <rect class="box mol" x="495" y="152" width="120" height="54"/><text class="box-t" x="555" y="176">PTT mode</text><text class="caption" x="555" y="192">voice.stt/tts</text>
    <rect class="box mol" x="630" y="152" width="130" height="54"/><text class="box-t" x="695" y="176">Interviewing</text><text class="caption" x="695" y="192">structured sessions</text>
  </g>

  <!-- Tier: atoms -->
  <text class="tier-label" x="30" y="252">SKILLS <tspan class="atomic">· atoms · Agent Skills spec (SKILL.md) — the portable core</tspan></text>
  <rect class="box atom" x="30" y="264" width="730" height="34"/>
  <text class="caption" x="395" y="286">capture · route-to-kb · drain-inbox · block-calendar · tts-speak · interview · sweep-sources · …</text>

  <!-- Side: MOD.md (templates) -->
  <g>
    <text class="tier-label" x="790" y="34">OVERLAY <tspan class="atomic">· templates</tspan></text>
    <rect class="box mod" x="790" y="46" width="140" height="252"/>
    <text class="box-t" x="860" y="74">MOD.md</text>
    <text class="caption" x="860" y="94">co-located, user-owned</text>
    <text class="caption" x="860" y="118">global MOD.md</text>
    <text class="caption" x="860" y="134">kb-registry.yaml</text>
    <text class="caption" x="860" y="150">capabilities/*/MOD.md</text>
    <text class="caption" x="860" y="182">upstream NEVER</text>
    <text class="caption" x="860" y="196">writes here</text>
    <text class="caption" x="860" y="228">onboarding writes</text>
    <text class="caption" x="860" y="242">ONLY here</text>
    <text class="caption" x="860" y="274">survives git pull</text>
    <text class="caption" x="860" y="288">by construction</text>
  </g>

  <!-- Transform band -->
  <text class="tier-label" x="30" y="348">AGENTIC INSTALL · the harness LLM installs = LLM( capability × MOD.md × cheat-sheet ) · upgrade = LLM merge · honest bookkeeping (lockfile · diffs · backups)</text>
  <rect class="box adapt" x="30" y="360" width="900" height="82"/>
  <text class="box-t" x="480" y="384" font-size="13">Per-harness cheat-sheets — knowledge, not code</text>
  <text class="caption" x="480" y="400">primitive mapping · materialization · introspection · secrets · removal · feature notes</text>
  <g transform="translate(70, 412)">
    <text class="side" x="0"   y="12">Hermes · <tspan font-style="italic">profiles + cron/jobs.json</tspan></text>
    <text class="side" x="230" y="12">NanoClaw · <tspan font-style="italic">groups + workspace</tspan></text>
    <text class="side" x="440" y="12">OpenClaw · <tspan font-style="italic">workspace md + HEARTBEAT</tspan></text>
    <text class="side" x="670" y="12" opacity="0.45">Claude Code · OpenCode <tspan font-style="italic">(later)</tspan></text>
  </g>

  <!-- Pages tier -->
  <text class="tier-label" x="30" y="492">PERSONALIZED INSTALLS <tspan class="atomic">· pages · your version, in your harness</tspan></text>
  <g>
    <rect class="box page" x="30" y="504" width="270" height="46" rx="23"/>
    <text x="165" y="532" font-size="12" fill="white" text-anchor="middle" font-weight="700">Almog's stack · Hermes/NanoClaw/OpenClaw</text>
    <rect class="box page" x="330" y="504" width="220" height="46" rx="23" opacity="0.85"/>
    <text x="440" y="532" font-size="12" fill="white" text-anchor="middle" font-weight="700">Collaborator's harness</text>
    <rect class="box page" x="580" y="504" width="180" height="46" rx="23" opacity="0.7"/>
    <text x="670" y="532" font-size="12" fill="white" text-anchor="middle" font-weight="700">Any user</text>
  </g>

  <!-- Flows -->
  <path class="flow" d="M94 92 C 94 118, 105 128, 105 152" marker-end="url(#arr)"/>
  <path class="flow" d="M234 92 C 234 118, 265 128, 265 152" marker-end="url(#arr)"/>
  <path class="flow" d="M374 92 C 374 118, 415 128, 415 152" marker-end="url(#arr)"/>
  <path class="flow" d="M519 92 C 519 118, 555 128, 555 152" marker-end="url(#arr)"/>
  <path class="flow" d="M105 206 L 105 264" marker-end="url(#arr)"/>
  <path class="flow" d="M415 206 L 415 264" marker-end="url(#arr)"/>
  <path class="flow" d="M695 206 L 695 264" marker-end="url(#arr)"/>
  <path class="flow" d="M395 298 L 395 360" marker-end="url(#arr)"/>
  <path class="flow" d="M860 298 C 860 320, 700 340, 660 360" marker-end="url(#arr)"/>
  <path class="flow" d="M165 442 L 165 504" marker-end="url(#arr)"/>
  <path class="flow" d="M440 442 L 440 504" marker-end="url(#arr)"/>
  <path class="flow" d="M670 442 L 670 504" marker-end="url(#arr)"/>

  <text x="480" y="596" class="caption">shared repo ships templates · your harness runs pages · MOD.md is the difference</text>
  <text x="480" y="616" class="caption">aos (placeholder, RFC-001) · architecture v0.1 · 2026-07-17 · MIT</text>
</svg>
