name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # version-bump check diffs against the base
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --prefix tools --no-audit --no-fund
      - name: tier-1 lint
        run: |
          BASE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="--base origin/${{ github.base_ref }}"
          fi
          node tools/lint/aos-lint.mjs $BASE
      - name: lint selftest
        run: node tools/lint/selftest/run.mjs
      - name: golden structural checks
        run: |
          if [ -f tools/golden/check.mjs ]; then
            node tools/golden/check.mjs
          else
            echo "golden checker not built yet (lands in WP5)"
          fi
