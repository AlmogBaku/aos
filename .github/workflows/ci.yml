name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # version-bump check diffs against the base
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: astral-sh/setup-uv@v5
      - run: npm ci --no-audit --no-fund
      - name: tier-0 base tool tests + example-base fixture
        run: |
          uv run --quiet tests/tool/test_base.py
          uv run --quiet --project capabilities/kb/tool base \
            --base tests/fixtures/example-base lint | tee /tmp/example-lint.txt
          grep -q "Critical (0)" /tmp/example-lint.txt
          grep -q "Findings (0)" /tmp/example-lint.txt
      - name: tier-1 lint
        run: |
          BASE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="--base origin/${{ github.base_ref }}"
          fi
          node tools/lint/aos-lint.mjs $BASE
      - name: lint selftest
        run: node tools/lint/selftest/run.mjs
      - name: golden structural checks
        run: node tests/golden/check.mjs
